<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width,initial-scale=1.0,maximum-scale=1.0"
  />
  <title>Poker Night Club</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app-shell">

  <!-- ================= AUTH ================= -->

  <section class="auth-screen panel" id="auth-panel">

    <div class="brand-logo">
      ♠ POKER NIGHT CLUB ♠
    </div>

    <h1>Welcome</h1>
    <p class="subtext">
      Multiplayer Texas Hold'em for friends.
    </p>

    <div class="stack">

      <input
        id="auth-email"
        type="email"
        placeholder="Email"
      >

      <input
        id="auth-password"
        type="password"
        placeholder="Password"
      >

      <input
        id="auth-name"
        type="text"
        placeholder="Display Name"
      >

      <button
        class="primary-button"
        id="signup-button"
      >
        Create Account
      </button>

      <button
        class="secondary-button"
        id="login-button"
      >
        Sign In
      </button>

      <button
        class="secondary-button"
        id="guest-button"
      >
        Continue as Guest
      </button>

      <p
        id="auth-message"
        class="error-text"
      ></p>

    </div>

  </section>

  <!-- ================= LOBBY ================= -->

  <section
    class="panel hidden"
    id="lobby-panel"
  >

    <div class="row-between">

      <div>
        <h2>Poker Lobby</h2>
        <p id="session-label">
          Signed in
        </p>
      </div>

      <button
        class="secondary-button"
        id="logout-button"
      >
        Logout
      </button>

    </div>

    <div class="lobby-grid">

      <div class="panel inset">

        <h3>Create Table</h3>

        <input
          id="create-table-name"
          placeholder="Friday Poker Night"
        >

        <input
          id="create-starting-stack"
          type="number"
          value="1000"
        >

        <input
          id="create-small-blind"
          type="number"
          value="10"
        >

        <input
          id="create-big-blind"
          type="number"
          value="20"
        >

        <button
          class="primary-button"
          id="create-table-button"
        >
          Create Table
        </button>

      </div>

      <div class="panel inset">

        <h3>Join Table</h3>

        <input
          id="join-code"
          placeholder="ROOM CODE"
        >

        <button
          class="secondary-button"
          id="join-table-button"
        >
          Join
        </button>

      </div>

    </div>

    <p
      id="lobby-message"
      class="error-text"
    ></p>

  </section>

  <!-- ================= TABLE ================= -->

  <section
    class="hidden"
    id="table-panel"
  >

    <!-- Top Header -->

    <header class="table-header">

      <div>

        <h2 id="table-title">
          Poker Night
        </h2>

        <p id="table-status">
          Waiting
        </p>

      </div>

      <div class="header-buttons">

        <div
          id="table-code-pill"
          class="pill"
        >
          Code
        </div>

        <button
          id="leave-table-button"
          class="secondary-button"
        >
          Leave
        </button>

      </div>

    </header>

    <!-- Summary -->

    <section class="summary-grid">

      <article class="summary-card">
        <span>Pot</span>
        <strong id="pot-value">
          0 pts
        </strong>
      </article>

      <article class="summary-card">
        <span>Street</span>
        <strong id="street-value">
          Waiting
        </strong>
      </article>

      <article class="summary-card">
        <span>Current Bet</span>
        <strong id="bet-value">
          0 pts
        </strong>
      </article>

      <article class="summary-card">
        <span>Turn</span>
        <strong id="turn-value">
          -
        </strong>
      </article>

    </section>

    <!-- Poker Table -->

    <section class="table-wrapper">

      <div class="poker-table">

        <!-- seats -->

        <div class="seat seat1"></div>
        <div class="seat seat2"></div>
        <div class="seat seat3"></div>
        <div class="seat seat4"></div>
        <div class="seat seat5"></div>
        <div class="seat seat6"></div>
        <div class="seat seat7"></div>
        <div class="seat seat8"></div>
        <div class="seat seat9"></div>
        <div class="seat seat10"></div>

        <!-- center -->

        <div class="table-center">

          <div
            id="hand-message"
            class="pill"
          >
            Waiting for host
          </div>

          <div
            id="community-cards"
            class="cards-row"
          ></div>

        </div>

      </div>

    </section>

    <!-- My Hand -->

    <section class="panel inset">

      <h3>Your Hand</h3>

      <div id="my-seat"></div>

    </section>

    <!-- Host -->

    <section class="panel inset">

      <h3>Host Controls</h3>

      <div id="host-controls"></div>

    </section>

    <!-- Actions -->

    <section class="panel inset action-panel">

      <h3>Action</h3>

      <div id="action-controls"></div>

    </section>

    <!-- Bottom Navigation -->

    <nav class="mobile-tabs">

      <button
        class="tab-button active"
        data-target="players-section"
      >
        Players
      </button>

      <button
        class="tab-button"
        data-target="log-section"
      >
        Log
      </button>

      <button
        class="tab-button"
        data-target="results-section"
      >
        Results
      </button>

    </nav>

    <!-- Players -->

    <section
      id="players-section"
      class="tab-content"
    >

      <div class="panel inset">

        <h3>Players</h3>

        <div id="players-table"></div>

      </div>

    </section>

    <!-- Log -->

    <section
      id="log-section"
      class="tab-content hidden"
    >

      <div class="panel inset">

        <h3>Action Log</h3>

        <div
          id="action-log"
          class="log-list"
        ></div>

      </div>

    </section>

    <!-- Results -->

    <section
      id="results-section"
      class="tab-content hidden"
    >

      <div class="panel inset">

        <h3>Results</h3>

        <div
          id="results-box"
          class="results-box"
        ></div>

      </div>

    </section>

  </section>

</div>

<script>
document.addEventListener("click", function(e){

  if(!e.target.classList.contains("tab-button"))
    return;

  document
    .querySelectorAll(".tab-button")
    .forEach(btn =>
      btn.classList.remove("active")
    );

  e.target.classList.add("active");

  document
    .querySelectorAll(".tab-content")
    .forEach(tab =>
      tab.classList.add("hidden")
    );

  document
    .getElementById(
      e.target.dataset.target
    )
    .classList.remove("hidden");

});
</script>

<script
  type="module"
  src="app.js"
></script>

</body>
</html>
